name: frontendv2
description: "企业财务审计条目存储系统 - Flutter桌面端"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # HTTP客户端
  dio: ^5.4.0
  # 状态管理
  flutter_riverpod: ^2.4.0
  # 路由管理
  go_router: ^12.0.0
  # JSON序列化
  json_annotation: ^4.12.0
  # 安全存储
  flutter_secure_storage: ^9.2.4
  # 普通存储
  shared_preferences: ^2.2.2
  # 文件选择
  file_picker: ^6.1.1
  # AES加密
  encrypt: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 代码生成
  build_runner: ^2.4.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
